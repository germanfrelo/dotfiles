name: Sync chezmoi config in docs

on:
  push:
    branches: [main]
    paths:
      - "home/.chezmoi.toml.tmpl"
      - ".chezmoiroot"
      - "home/private_dot_config/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run chezmoi:sync
        run: npm run chezmoi:sync

      - name: Open PR if docs changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: Sync chezmoi config in docs"
          title: "chore: Sync chezmoi config in docs"
          body: |
            Auto-generated by the `sync-chezmoi-config` workflow.

            One or more of the following changed:
            - `home/.chezmoi.toml.tmpl`
            - `.chezmoiroot`
            - `home/private_dot_config/**`

            Re-ran `npm run chezmoi:sync` to update the generated sections in
            `docs/chezmoi.md` and `.github/copilot-instructions.md`.
          branch: chore/sync-chezmoi-config
          delete-branch: true
          labels: "chore,documentation"
